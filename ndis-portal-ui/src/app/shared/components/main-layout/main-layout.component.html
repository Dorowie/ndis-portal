<div class="layout-container" id="main-layout-wrapper">
  <app-sidebar 
    id="app-sidebar-nav" 
    [class.sidebar-open]="isSidebarOpen">
  </app-sidebar>

  <div 
    id="sidebar-overlay-backdrop"
    class="sidebar-backdrop" 
    [class.visible]="isSidebarOpen" 
    (click)="closeSidebar()">
  </div>

  <div class="main-body" id="layout-main-section">
    <app-top-nav 
      id="app-top-navigation" 
      (toggle)="toggleSidebar()">
    </app-top-nav>
    
    <main class="page-content" id="router-content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
  
  <app-chatbot id="app-chatbot-component"></app-chatbot>
</div>
