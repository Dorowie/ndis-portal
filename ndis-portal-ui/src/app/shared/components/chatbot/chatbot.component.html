<div class="chatbot-container" id="chatbot-main-container">
  
  @if (isOpen) {
    <div class="chat-window" id="chatbot-window">
      <div class="chat-header">
        <div class="header-left">
          <img src="assets/icon-chat.png" alt="Bot" class="header-avatar" id="chatbot-header-icon">
          <span class="header-name" id="chatbot-header-name">Just Tell</span>
        </div>
        <div class="header-right">
          <button id="btn-chatbot-close" class="control-btn" (click)="toggleChat()" title="Close">×</button>
        </div>
      </div>

      <div class="chat-body" #chatBody id="chatbot-body">
        @for (msg of messages; track msg; let i = $index) {
          <div class="message-wrapper" [class.user-message]="msg.sender === 'user'" [id]="'chat-wrapper-' + i">
            @if (msg.sender === 'bot') {
              <img src="assets/icon-chat.png" alt="Bot" class="msg-avatar" [id]="'chat-bot-avatar-' + i">
            }
            <div class="bubble" 
                 [class.bot-bubble]="msg.sender === 'bot'" 
                 [class.user-bubble]="msg.sender === 'user'"
                 [id]="'chat-bubble-' + i">
              <markdown [data]="msg.text"></markdown>
            </div>
          </div>
        }

        @if (isTyping) {
          <div class="message-wrapper" id="chatbot-typing-indicator">
            <img src="assets/icon-chat.png" alt="Bot" class="msg-avatar">
            <div class="bubble bot-bubble typing-indicator">
              <span></span><span></span><span></span>
            </div>
          </div>
        }
      </div>

      <div class="chat-footer">
        <div class="input-box" [class.input-error]="isOverWordLimit">
          <textarea 
            id="chatbot-input-field"
            [(ngModel)]="userInput" 
            (keydown)="onKeydown($event)" 
            placeholder="Type a message..."
            [disabled]="isTyping"
            rows="1"
          ></textarea>

          <button id="btn-chatbot-send" class="send-btn" (click)="sendMessage()" 
                  [disabled]="isTyping || currentWordCount === 0 || isOverWordLimit">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
              <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z"/>
            </svg>
          </button>
        </div>
        
        <div class="footer-meta">
          @if (isOverWordLimit) {
            <span class="error-text">Message exceeds 500 words.</span>
          } @else {
            <span></span> }
          <span class="word-counter" [class.limit-reached]="isOverWordLimit">
            {{ currentWordCount }} / 500
          </span>
        </div>
      </div>
    </div>
  }

  @if (!isOpen) {
    @if (showTooltip) {
      <div class="chat-tooltip" id="chatbot-tooltip">
        Need assistance? Just Tell me.
        <button id="btn-close-tooltip" class="close-tooltip" (click)="closeTooltip($event)">×</button>
      </div>
    }
    <img 
      id="chatbot-launcher-icon"
      src="assets/chatbot.png" 
      alt="Chatbot Support" 
      class="chat-image-only" 
      (click)="toggleChat()"
    >
  }
</div>
