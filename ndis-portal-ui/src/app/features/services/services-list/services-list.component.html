<div class="services-list-page">
  <div class="page-header">
    <h1>Available Services</h1>
    <p>Browse and select from our range of NDIS support services</p>
  </div>

  <div class="filter-section">
    <label>Filter by Category:</label>
    <select (change)="onCategoryChange($event)" [value]="selectedCategory">
      <option value="Category">All Categories</option>
      <option *ngFor="let category of categories.slice(1)" [value]="category">
        {{ category }}
      </option>
    </select>
  </div>

  <div *ngIf="isLoading" class="loading-state">
    Loading services...
  </div>

  <div *ngIf="!isLoading && filteredServices.length === 0" class="empty-state">
    No services match the selected category.
  </div>

  <div class="services-grid" *ngIf="!isLoading && filteredServices.length > 0">
    <div
      class="service-card"
      *ngFor="let service of filteredServices"
      (click)="openService(service)"
      [style.border-left-color]="service.accent"
    >
      <div class="icon-circle">
        <span class="material-icons">{{ service.icon }}</span>
      </div>
      <h3>{{ service.name }}</h3>
      <p>{{ service.description }}</p>
      <button type="button" class="select-btn" (click)="openService(service); $event.stopPropagation()">
        View Details
      </button>
    </div>
  </div>
</div>
