<div class="services-list-page">
  <div class="page-header">
    <h1>Available Services</h1>
    <p>Browse and select from our range of NDIS support services</p>
  </div>

  <div class="filter-section">
    <button
      class="category-filter-btn"
      [class.active]="selectedCategory === 'Category'"
      (click)="selectCategory('Category')"
      data-testid="category-filter-btn"
    >
      All
    </button>
    <button
      *ngFor="let category of categories.slice(1)"
      class="category-filter-btn"
      [class.active]="selectedCategory === category"
      (click)="selectCategory(category)"
      data-testid="category-filter-btn"
    >
      {{ category }}
    </button>
  </div>

  <div *ngIf="isLoading" class="loading-state" data-testid="loading-spinner">
    <div class="spinner"></div>
    <p>Loading services...</p>
  </div>

  <div *ngIf="!isLoading && filteredServices.length === 0" class="empty-state" data-testid="empty-state">
    <p>No services match the selected filter.</p>
    <button (click)="selectCategory('Category')">Show All Services</button>
  </div>

  <div class="services-grid" *ngIf="!isLoading && filteredServices.length > 0">
    <div
      class="service-card"
      *ngFor="let service of filteredServices"
      (click)="openService(service)"
      [style.border-left-color]="service.accent"
      data-testid="service-card"
    >
      <div class="icon-circle">
        <span class="material-icons">{{ service.icon }}</span>
      </div>
      <div class="category-badge">{{ service.category_name }}</div>
      <h3>{{ service.name }}</h3>
      <p class="description-truncated">{{ service.description }}</p>
      <button type="button" class="select-btn" (click)="openService(service); $event.stopPropagation()">
        View Details
      </button>
    </div>
  </div>
</div>

<!-- Service Recommendation Modal -->
<app-service-recommendation-modal></app-service-recommendation-modal>
