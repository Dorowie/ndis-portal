<div class="top-bar">
  <div class="heading-block">
    <h1 class="app-section-title" id="selection-page-title">Service Selection</h1>
    <p class="app-section-subtitle">Choose a support category that best fits your requirements today.</p>
  </div>

  <div class="right-controls">
    <button class="recommendation-button" (click)="openRecommendationModal()">
      <span class="material-icons button-icon">psychology</span>
      Find the right service for me
    </button>
    <span class="filter-label">Filter by Category</span>
    <div class="category-dropdown">
      <span class="material-icons dropdown-icon">tune</span>
      
      <select id="category-filter-select" (change)="onCategoryChange($event)" [value]="selectedCategory">
        <option value="Category" hidden disabled selected>Category</option>
        
        <option *ngFor="let category of categories" [value]="category" [id]="'filter-option-' + category">
          {{ category }}
        </option>
      </select>

      <span class="material-icons arrow-icon">expand_more</span>
    </div>
  </div>

</div>

<div *ngIf="isLoading" class="loading-state app-surface" id="services-loading-spinner">
  Loading services...
</div>

<div
  *ngIf="!isLoading && filteredServices.length === 0"
  class="empty-state app-surface"
  id="services-empty-state"
>
  No services match the selected category.
</div>

<div class="cards-grid" *ngIf="!isLoading && filteredServices.length > 0" id="services-grid-container">
  <div
    class="service-card app-surface"
    *ngFor="let service of filteredServices"
    [id]="'service-card-' + service.id"
    [style.border-left-color]="service.accent"
    (click)="openService(service)"
  >
    <div class="icon-circle">
      <span class="material-icons" [id]="'service-icon-' + service.id">{{ service.icon }}</span>
    </div>

    <h3 [id]="'service-name-' + service.id">{{ service.name }}</h3>
    <p [id]="'service-desc-' + service.id">{{ service.description }}</p>

    <button
      [id]="'btn-select-service-' + service.id"
      type="button"
      class="select-btn"
      (click)="openService(service); $event.stopPropagation()"
    >
      Select
    </button>
  </div>
</div>

<!-- Service Recommendation Modal -->
<app-service-recommendation-modal></app-service-recommendation-modal>
