<div class="service-detail-page">
  <button class="back-btn" (click)="goBack()">
    <span class="material-icons">arrow_back</span> Back to Services
  </button>

  <div *ngIf="isLoading" class="loading-state">
    Loading service details...
  </div>

  <div *ngIf="error" class="error-state">
    {{ error }}
  </div>

  <div *ngIf="!isLoading && service" class="service-content">
    <div class="service-header">
      <h1>{{ service.name }}</h1>
      <span class="category-badge">{{ service.category_name }}</span>
    </div>

    <div class="service-info">
      <div class="info-section">
        <h3>Description</h3>
        <p>{{ service.description }}</p>
      </div>

      <div class="info-section" *ngIf="service.price">
        <h3>Pricing</h3>
        <p class="price">${{ service.price }} per hour</p>
      </div>

      <div class="info-section">
        <h3>Service ID</h3>
        <p class="service-id">#{{ service.id }}</p>
      </div>
    </div>

    <div class="actions">
      <button class="book-btn" (click)="bookService()">Book This Service</button>
    </div>
  </div>
</div>
